<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASM — Attack Surface Manager</title>
<link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>

<div id="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
</div>

<header>
  <div class="inner">
    <div class="logo" onclick="showPage('hero')">ASM <span>v2</span></div>
    <nav>
      <button onclick="showPage('target-list')">Targets</button>
      <button onclick="showPage('hero')">Home</button>
    </nav>
  </div>
</header>

<!-- ═══ PAGE 1: HERO ─── just an input ═══ -->
<div id="hero" class="page active">
  <div class="hero">
    <div class="hero-badge">🔒 Open Source Attack Surface Manager</div>
    <h1>What domain do you<br>want to analyze?</h1>
    <form id="heroForm">
      <div class="hero-input-wrap">
        <input id="heroInput" type="text" placeholder="example.com" autofocus required>
        <button id="heroBtn" type="submit">→</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ PAGE 2: TARGETS ─── card grid ═══ -->
<div id="target-list" class="page">
  <div class="page-inner">
    <div class="page-header">
      <h1>Targets <span id="totalTargets" style="font-size:16px;font-weight:400;color:var(--text3)"></span></h1>
    </div>
    <div class="form-row" style="margin-bottom:20px">
      <input id="targetInput" type="text" placeholder="Add another domain..." style="flex:1;max-width:400px">
    </div>
    <div id="targetGrid" class="target-grid"></div>
  </div>
</div>

<!-- ═══ PAGE 3: TARGET DETAIL ═══ -->
<div id="target-detail" class="page">
  <div class="page-inner">
    <button class="back-btn" onclick="showPage('target-list')">← All Targets</button>
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap">
      <div>
        <h1 id="detailTitle">Loading...</h1>
        <div class="sub" id="detailSubtitle"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <strong>Risk: <span id="detailRisk"></span></strong>
        <button class="btn btn-sm" onclick="runScanFromDetail()">🔄 Scan</button>
        <button class="btn btn-sm btn-outline" onclick="refreshDetail()">Refresh</button>
      </div>
    </div>
    <div id="detailStats" class="stats-grid"></div>

    <div class="section">
      <h2>Assets <span id="assetCount"></span></h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailAssets"></div>
    </div>

    <div class="section">
      <h2>Scans</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailScans"></div>
    </div>

    <div class="section">
      <h2>Risk Classification</h2>
      <div class="card" id="detailClassification"></div>
    </div>
  </div>
</div>

<script src="/static/js/app.js?v=2"></script>
</body>
</html>
