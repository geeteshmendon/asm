<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASM — Attack Surface Manager</title>
<link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>

<div id="solar-system">
  <div class="sun"></div>
  <div class="orbit o1"><div class="planet p1"></div></div>
  <div class="orbit o2"><div class="planet p2"></div></div>
  <div class="orbit o3"><div class="planet p3"></div></div>
  <div class="orbit o4"><div class="planet p4"></div></div>
  <div class="orbit o5"><div class="planet p5"></div></div>
</div>

<header>
  <div class="inner">
    <div class="logo" onclick="showPage('hero')">ASM <span>v3</span></div>
    <nav>
      <button onclick="showPage('target-list')">Targets</button>
      <button onclick="showPage('hero')">Home</button>
    </nav>
  </div>
</header>

<!-- PAGE 1: HERO -->
<div id="hero" class="page active">
  <div class="hero">
    <div class="hero-badge">Open Source Attack Surface Manager</div>
    <h1>What domain do you<br>want to analyze?</h1>
    <p style="color:var(--text2);margin-bottom:36px">Get a comprehensive security report — subdomains, ports, vulnerabilities, CVEs, and more</p>
    <form id="heroForm">
      <div class="hero-input-wrap">
        <input id="heroInput" type="text" placeholder="example.com" autofocus required>
        <button id="heroBtn" type="submit">→</button>
      </div>
    </form>
  </div>
</div>

<!-- PAGE 2: TARGETS -->
<div id="target-list" class="page">
  <div class="page-inner">
    <div class="page-header">
      <h1>Targets <span id="totalTargets" style="font-size:16px;font-weight:400;color:var(--text3)"></span></h1>
    </div>
    <div class="form-row" style="margin-bottom:20px">
      <input id="targetInput" type="text" placeholder="Add another domain..." style="flex:1;max-width:400px">
    </div>
    <div id="targetGrid" class="target-grid"></div>
  </div>
</div>

<!-- PAGE 3: COMPREHENSIVE TARGET REPORT -->
<div id="target-detail" class="page">
  <div class="page-inner">
    <button class="back-btn" onclick="showPage('target-list')">← All Targets</button>
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap">
      <div>
        <h1><span id="detailTitle">Loading...</span> <span id="detailRating" style="font-size:28px;font-weight:900;margin-left:12px"></span></h1>
        <div class="sub" id="detailSubtitle"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <button class="btn" onclick="runComprehensiveScan()">🔄 Deep Scan</button>
      </div>
    </div>
    <div id="detailStats" class="stats-grid"></div>
    <div id="detailBody">

    <!-- Vulnerabilities -->
    <div class="section">
      <h2>🔴 Vulnerabilities <span>top findings</span></h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailVulns"></div>
    </div>

    <!-- Technology Stack -->
    <div class="section">
      <h2>⚡ Technology Stack</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailTech"></div>
    </div>

    <!-- Open Ports -->
    <div class="section">
      <h2>🔌 Open Ports</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailPorts"></div>
    </div>

    <!-- Subdomains -->
    <div class="section">
      <h2>🌐 Subdomains</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailSubdomains"></div>
    </div>

    <!-- All Assets -->
    <div class="section">
      <h2>📦 All Assets</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailAssets"></div>
    </div>

    <!-- Scan History -->
    <div class="section">
      <h2>📋 Scan History</h2>
      <div class="card" style="padding:0;overflow:hidden" id="detailScans"></div>
    </div>

    </div>
  </div>
</div>

<script src="/static/js/app.js?v=3"></script>
</body>
</html>
